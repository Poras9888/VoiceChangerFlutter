name: voice_changer_sound_effects_recorder
description: Voice Changer & Sound Effects Recorder
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.2.1
  http: ^1.6.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  record: ^6.2.0
  just_audio: ^0.10.5
  flutter_tts: ^4.0.2
  permission_handler: ^12.0.1
  local_auth: ^3.0.1
  share_plus: ^13.0.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  equatable: ^2.0.8

  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  injectable_generator: ^2.12.1
  drift_dev: ^2.32.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/

dependency_overrides:
  win32: 5.15.0
